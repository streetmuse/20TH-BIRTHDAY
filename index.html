<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>An Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --ivory:#FBF4F1;
    --blush:#F6DCE0;
    --rose:#D98AA0;
    --mauve:#B86B8A;
    --wine:#58202F;
    --gold:#C6A35A;
    --display:'Cormorant Garamond', Georgia, serif;
    --body:'Jost', system-ui, sans-serif;
    --script:'Pinyon Script', cursive;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--body);
    background:var(--ivory);
    color:var(--wine);
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- GATE (the envelope) ---------- */
  #gate{
    position:fixed;inset:0;z-index:50;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2.2rem;
    background:
      radial-gradient(120% 120% at 50% 30%, var(--ivory) 0%, var(--blush) 100%);
    transition:opacity 1s ease, visibility 1s ease;
  }
  #gate.open{opacity:0;visibility:hidden;pointer-events:none}

  .gate-eyebrow{
    font-size:.78rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--mauve);font-weight:400;padding-left:.42em;
  }
  .seal{
    width:130px;height:130px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%, var(--rose), var(--mauve));
    box-shadow:0 14px 34px -10px rgba(88,32,47,.5), inset 0 2px 6px rgba(255,255,255,.4);
    border:1px solid rgba(198,163,90,.6);
    color:var(--ivory);font-family:var(--display);font-size:2.7rem;font-style:italic;
    transition:transform .4s cubic-bezier(.2,.8,.2,1), box-shadow .4s;
    position:relative;
  }
  .seal::after{
    content:"";position:absolute;inset:9px;border-radius:50%;
    border:1px dashed rgba(251,244,241,.55);
  }
  .seal:hover{transform:scale(1.06);box-shadow:0 18px 40px -10px rgba(88,32,47,.6)}
  .seal:active{transform:scale(.97)}
  .gate-hint{font-size:.82rem;color:var(--mauve);letter-spacing:.16em;opacity:.85}
  .gate-hint span{color:var(--gold)}

  /* ---------- INVITATION ---------- */
  #invite{
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;
    text-align:center;padding:5.5rem 1.5rem 4rem;
    position:relative;z-index:1;
    opacity:0;
  }
  #invite.show{animation:fadeIn 1.1s ease forwards}
  @keyframes fadeIn{to{opacity:1}}

  .rise{opacity:0;transform:translateY(22px)}
  #invite.show .rise{animation:rise .9s cubic-bezier(.2,.8,.2,1) forwards}
  #invite.show .rise:nth-child(1){animation-delay:.15s}
  #invite.show .rise:nth-child(2){animation-delay:.30s}
  #invite.show .rise:nth-child(3){animation-delay:.45s}
  #invite.show .rise:nth-child(4){animation-delay:.62s}
  #invite.show .rise:nth-child(5){animation-delay:.80s}
  #invite.show .rise:nth-child(6){animation-delay:.95s}
  @keyframes rise{to{opacity:1;transform:translateY(0)}}

  .eyebrow{
    font-size:.78rem;letter-spacing:.42em;text-transform:uppercase;
    color:var(--mauve);padding-left:.42em;
  }
  .flourish{
    display:flex;align-items:center;justify-content:center;gap:.9rem;
    margin:1.4rem 0;color:var(--gold);
  }
  .flourish::before,.flourish::after{
    content:"";height:1px;width:62px;
    background:linear-gradient(90deg,transparent,var(--gold));
  }
  .flourish::after{background:linear-gradient(90deg,var(--gold),transparent)}
  .flourish-dot{width:6px;height:6px;border:1px solid var(--gold);transform:rotate(45deg)}

  .name{
    font-family:var(--script);
    font-size:clamp(4.5rem,16vw,9rem);
    line-height:.9;color:var(--mauve);font-weight:400;
    margin:.2rem 0;
  }
  .turning{
    font-family:var(--display);font-style:italic;
    font-size:clamp(1.4rem,4.5vw,2.1rem);
    color:var(--wine);font-weight:400;letter-spacing:.02em;
  }
  .turning b{font-style:normal;font-weight:600;color:var(--rose)}

  .card{
    margin-top:3.2rem;width:min(440px,92vw);
    background:rgba(255,255,255,.55);
    border:1px solid rgba(198,163,90,.45);
    border-radius:4px;padding:2.4rem 2rem;
    backdrop-filter:blur(2px);
    box-shadow:0 20px 50px -28px rgba(88,32,47,.45);
  }
  .card h2{
    font-family:var(--display);font-weight:500;
    font-size:1.5rem;color:var(--wine);margin-bottom:1.4rem;
  }
  .detail{margin:1rem 0}
  .detail .label{
    font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
    color:var(--gold);display:block;margin-bottom:.25rem;
  }
  .detail .value{
    font-family:var(--display);font-size:1.25rem;color:var(--wine);
  }

  .rsvp{
    display:inline-block;margin-top:2.6rem;
    font-family:var(--body);font-weight:400;font-size:.82rem;
    letter-spacing:.22em;text-transform:uppercase;
    color:var(--ivory);background:var(--mauve);
    padding:.95rem 2.6rem;border-radius:2px;text-decoration:none;
    border:1px solid var(--gold);cursor:pointer;
    transition:background .35s, transform .2s;
  }
  .rsvp:hover{background:var(--wine);transform:translateY(-2px)}

  .rsvp-note{
    margin-top:.9rem;font-size:.82rem;color:var(--mauve);
    font-style:italic;font-family:var(--display);
  }

  .signoff{
    margin-top:3rem;font-family:var(--display);font-style:italic;
    font-size:1.05rem;color:var(--mauve);
  }

  /* placeholder marker so you can spot what to edit */
  .ph{color:var(--rose);border-bottom:1px dotted var(--rose)}

  /* ---------- music toggle ---------- */
  #music{
    position:fixed;top:1.1rem;right:1.1rem;z-index:60;
    width:46px;height:46px;border-radius:50%;cursor:pointer;
    border:1px solid var(--gold);
    background:rgba(255,255,255,.6);color:var(--mauve);
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);
    transition:transform .25s, background .25s;
  }
  #music:hover{transform:scale(1.08);background:#fff}
  #music svg{width:20px;height:20px}

  /* ---------- petals ---------- */
  .petal{
    position:fixed;top:-30px;z-index:0;border-radius:0 70% 0 70%;
    background:var(--blush);opacity:.55;pointer-events:none;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{transform:translateY(0) rotate(0);opacity:0}
    10%{opacity:.6}
    100%{transform:translateY(108vh) rotate(420deg);opacity:0}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none!important;transition:none!important}
    .rise{opacity:1;transform:none}
    #invite{opacity:1}
    .petal{display:none}
  }
</style>
</head>
<body>

  <!-- music control -->
  <button id="music" aria-label="Toggle music" title="Music on / off">
    <svg id="ico-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="display:none">
      <path d="M3 10v4h4l5 5V5L7 10H3z"/><path d="M16 9a3 3 0 010 6"/><path d="M19 6a7 7 0 010 12"/>
    </svg>
    <svg id="ico-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 10v4h4l5 5V5L7 10H3z"/><line x1="16" y1="9" x2="22" y2="15"/><line x1="22" y1="9" x2="16" y2="15"/>
    </svg>
  </button>

  <!-- the gate -->
  <section id="gate">
    <div class="gate-eyebrow">You're invited</div>
    <button class="seal" id="seal" aria-label="Open the invitation">E</button>
    <div class="gate-hint">tap to open &nbsp;·&nbsp; <span>music plays</span></div>
  </section>

  <!-- the invitation -->
  <main id="invite">
    <div class="rise eyebrow">Please join us to celebrate</div>

    <div class="rise flourish"><span class="flourish-dot"></span></div>

    <h1 class="rise name">Elene</h1>

    <p class="rise turning">is turning <b>twenty</b></p>

    <div class="rise card">
      <h2>The Celebration</h2>
      <div class="detail">
        <span class="label">When</span>
        <span class="value">Friday, 10 July</span>
      </div>
      <div class="detail">
        <span class="label">Time</span>
        <span class="value"><span class="ph">00:00 PM</span></span>
      </div>
      <div class="detail">
        <span class="label">Where</span>
        <span class="value"><span class="ph">Venue · City</span></span>
      </div>
      <a class="rsvp" id="rsvp">Confirm on Instagram</a>
      <p class="rsvp-note">Tap above, then send us a message to let us know you're coming</p>
    </div>

    <p class="rise signoff">with love, and a little glitter ✦</p>
  </main>

    let cursor = 0.15;
    tune.forEach(([n, b]) => { note(N[n], cursor, b * beat); cursor += b * beat; });
    timer = setTimeout(schedule, (cursor + 1.2) * 1000);
  }
  function startSynth(){
    ctx = ctx || new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    gain = ctx.createGain(); gain.gain.value = 0.22; gain.connect(ctx.destination);
    schedule();
  }
  function stopSynth(){ clearTimeout(timer); if (gain) gain.disconnect(); }

  function start(){
    if (playing) return;
    playing = true; setIcon(true);
    track.currentTime = 0;
    const p = track.play();
    if (p && p.catch) p.catch(err => {
      console.warn('[invite] embedded track blocked — using fallback tune. Reason:',
                   err && err.name, err && err.message);
      startSynth();
    });
  }
  track.addEventListener('error', () => {
    console.warn('[invite] audio element error code:', track.error && track.error.code);
  });
  function stop(){
    playing = false; setIcon(false);
    track.pause(); stopSynth();
  }
  function toggle(){ playing ? stop() : start(); }

  function setIcon(on){
    document.getElementById('ico-on').style.display  = on ? 'block' : 'none';
    document.getElementById('ico-off').style.display = on ? 'none'  : 'block';
  }
  return { start, toggle };
})();
